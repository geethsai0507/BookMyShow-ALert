name: Feature request
description: Suggest an idea to improve ShowAlert
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion. Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you thought about

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: UX, reliability, performance, or maintainability impact
